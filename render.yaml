services:
  - type: web
    name: fluffbuzz
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: FLUFFBUZZ_STATE_DIR
        value: /data/.fluffbuzz
      - key: FLUFFBUZZ_WORKSPACE_DIR
        value: /data/workspace
      - key: FLUFFBUZZ_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: fluffbuzz-data
      mountPath: /data
      sizeGB: 1
