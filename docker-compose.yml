services:
  fluffbuzz-gateway:
    image: ${FLUFFBUZZ_IMAGE:-fluffbuzz:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      FLUFFBUZZ_GATEWAY_TOKEN: ${FLUFFBUZZ_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${FLUFFBUZZ_CONFIG_DIR}:/home/node/.fluffbuzz
      - ${FLUFFBUZZ_WORKSPACE_DIR}:/home/node/.fluffbuzz/workspace
    ports:
      - "${FLUFFBUZZ_GATEWAY_PORT:-18789}:18789"
      - "${FLUFFBUZZ_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${FLUFFBUZZ_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  fluffbuzz-cli:
    image: ${FLUFFBUZZ_IMAGE:-fluffbuzz:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      FLUFFBUZZ_GATEWAY_TOKEN: ${FLUFFBUZZ_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${FLUFFBUZZ_CONFIG_DIR}:/home/node/.fluffbuzz
      - ${FLUFFBUZZ_WORKSPACE_DIR}:/home/node/.fluffbuzz/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
